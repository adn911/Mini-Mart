spring:
  application:
    name: mini-mart-backend
  datasource:
    url: jdbc:h2:mem:minimart;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true

app:
  jwt:
    secret: "mini-mart-jwt-secret-key-that-is-long-enough-for-hmac-sha256-2024"
    expiration-ms: 86400000
